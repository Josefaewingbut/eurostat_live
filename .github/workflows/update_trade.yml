name: Update trade data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 6 5 * *'

permissions:
  contents: write

jobs:
  update-trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('eurostat','dplyr','tidyr','readr'), repos='https://cloud.r-project.org')"

      - name: Run trade script
        run: Rscript scripts/update_trade.R

      - name: Commit and push updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trade_live_data.csv
          git commit -m "update trade data" || echo "no changes"
          git push
