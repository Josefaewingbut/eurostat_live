name: Public Debt Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "20 6 * * *"

permissions:
  contents: write

jobs:
  update-debt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            eurostat
            dplyr
            tidyr
            readr
            lubridate

      - name: Run debt script
        run: Rscript scripts/update_debt.R

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "update public debt data"
          git push
