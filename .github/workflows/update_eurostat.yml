name: Update Eurostat CSVs

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("eurostat","dplyr","tidyr","readr","lubridate"), repos="https://cloud.r-project.org")'

      - name: Run scripts
        run: |
          Rscript scripts/update_hicp.R
          Rscript scripts/update_debt.R

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update Eurostat data"
          git push
