name: Update HICP (Eurostat)

on:
  schedule:
    - cron: "15 6 * * *"   # todos los días 06:15 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::eurostat
            any::dplyr
            any::tidyr
            any::readr
            any::lubridate

      - name: Run update script
        run: Rscript scripts/update_hicp.R

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hicp_inflation_yoy_monthly_EA20_DE_FR_IT_ES.csv
          git diff --staged --quiet || git commit -m "Auto-update HICP inflation CSV"
          git push
